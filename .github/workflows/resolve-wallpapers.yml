name: Resolve wallpapers
on:
  workflow_dispatch:
  push:
    branches: [claude/ixclock-html-page-jhfqhc]
    paths: ['scripts/resolve-trigger.txt']
permissions:
  contents: write
jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/resolve-wallpapers.mjs
      - run: |
          git config user.name "wallpaper-resolver"
          git config user.email "actions@users.noreply.github.com"
          git add wallpapers-resolved.json
          git commit -m "Add resolved wallpaper video/poster URLs" || echo "no changes"
          git push
